      - region "For Search Engines" [ref=e37]:
        - heading "What Is Paritsea" [level=2] [ref=e38]
        - paragraph [ref=e39]: Paritsea is a doctrine of structural coherence and legitimacy. A constitutional reference framework for examining whether organised systems maintain coherence between authority, responsibility, and operational reality. Authored by Parit Ritchai. Not affiliated with any institution, regulator, government, or commercial entity.
        - heading "The Doctrine and Method" [level=2] [ref=e40]
        - paragraph [ref=e41]: The Paritsea Doctrine establishes structural coherence as a prerequisite for legitimacy. The Method provides a structural analytical framework for evaluation. Protocols formalise structural principles. Standards are domain-specific structural applications.
        - heading "The Records" [level=2] [ref=e42]
        - paragraph [ref=e43]: The Records document structural observations from real systems. They precede formal application development. They are archival references.
